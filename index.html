<!doctype html>
<!-- Declares the document type and tells the browser this is an HTML5 document -->

<html lang="en">
<!-- The root HTML element. "lang=en" helps browsers and screen readers know the page language -->

  <head>

    <!-- Sets the character encoding so the browser can properly display text -->
    <meta charset="UTF-8" />

    <!-- Adds the small icon shown in the browser tab -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Ensures the page scales correctly on mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title displayed in the browser tab -->
    <title>todo-list</title>
  </head>
  <body>

    <!-- Root element where the React application will be mounted -->
    <!-- React will replace this div with the entire app UI -->
    <div id="root"></div>

    <!-- Loads the main React entry file which starts the application -->
    <!-- Vite uses type="module" to support modern JavaScript imports -->
    <script type="module" src="/src/main.jsx"></script>
    
  </body>
</html>
